<title>Crozier Counsel — Coming Soon</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png">
<meta name="description" content="Crozier Counsel — Authoritative counsel at the intersection of technology, innovation policy and economic transformation.">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=EB+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1A2332;
    --cream: #FAF9F6;
    --warm-grey: #E8E4DF;
    --mid-grey: #8A8578;
    --blue: #7FACC8;
    --gold: #BF9A3A;
    --rose: #C86B75;
    --pearl: #B5B0A8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'EB Garamond', Georgia, serif;
    background: var(--navy);
    color: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
  }

  .container {
    max-width: 600px;
    width: 100%;
  }

  /* Double-ring monogram */
  .monogram {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 48px;
  }

  .monogram .outer {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1.5px solid var(--blue);
  }

  .monogram .inner {
    position: absolute;
    inset: 5px;
    border-radius: 50%;
    border: 1px solid var(--rose);
  }

  .monogram .letters {
    font-family: 'Libre Baskerville', serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--cream);
    position: relative;
    z-index: 1;
  }

  /* Wordmark */
  h1 {
    font-family: 'Libre Baskerville', serif;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--cream);
    line-height: 1;
    margin-bottom: 14px;
  }

  /* Ribbon divider */
  .ribbon {
    display: flex;
    justify-content: center;
    margin: 0 auto 14px;
    width: 40px;
    height: 3px;
  }

  .ribbon .edge { width: 20%; height: 100%; background: var(--pearl); }
  .ribbon .centre { width: 60%; height: 100%; background: var(--rose); }

  /* Tagline */
  .tagline {
    font-family: 'EB Garamond', serif;
    font-size: 14px;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: var(--blue);
    margin-bottom: 48px;
  }

  /* Description */
  .description {
    font-family: 'EB Garamond', serif;
    font-size: 18px;
    line-height: 1.7;
    color: var(--pearl);
    font-style: italic;
    margin-bottom: 48px;
  }

  /* Launching badge */
  .launching {
    font-family: 'EB Garamond', serif;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
  }

  /* Contact */
  .contact a {
    font-family: 'EB Garamond', serif;
    font-size: 15px;
    color: var(--blue);
    text-decoration: none;
    letter-spacing: 0.5px;
    transition: color 0.3s ease;
  }

  .contact a:hover {
    color: var(--gold);
  }

  /* Footer */
  .footer {
    margin-top: 64px;
    font-family: 'EB Garamond', serif;
    font-size: 11px;
    color: var(--mid-grey);
    letter-spacing: 1px;
  }

  @media (max-width: 600px) {
    h1 {
      font-size: 22px;
      letter-spacing: 3px;
    }

    .monogram {
      width: 64px;
      height: 64px;
      margin-bottom: 36px;
    }

    .monogram .letters {
      font-size: 20px;
    }

    .description {
      font-size: 16px;
    }
  }
</style>
</head>
<body>

<div class="container">
  <div class="monogram">
    <div class="outer"></div>
    <div class="inner"></div>
    <span class="letters">CC</span>
  </div>

  <h1>Crozier Counsel</h1>

  <div class="ribbon">
    <div class="edge"></div>
    <div class="centre"></div>
    <div class="edge"></div>
  </div>

  <div class="tagline">Strategic Advisory</div>

  <div class="description">
    Authoritative counsel at the intersection of technology,
    innovation policy and economic transformation.
  </div>

  <div class="launching">Launching 2026</div>

  <div class="contact">
    <a href="mailto:info@croziercounsel.com">info@croziercounsel.com</a>
  </div>

  <div class="footer">&copy; 2026 Crozier Counsel</div>
</div>

</body>
</html>
