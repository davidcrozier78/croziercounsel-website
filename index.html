<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crozier Counsel — Coming Soon</title>
<meta name="description" content="Crozier Counsel. Strategic advisory at the intersection of technology, policy and transformation. Launching 2026.">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1A2332;
    --cream: #FAF9F6;
    --warm-grey: #E8E4DF;
    --mid-grey: #8A8578;
    --blue: #7FACC8;
    --gold: #BF9A3A;
    --rose: #C86B75;
    --pearl: #B5B0A8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'EB Garamond', Georgia, serif;
    background: var(--navy);
    color: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 35% 45%, rgba(127, 172, 200, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 65% 55%, rgba(191, 154, 58, 0.03) 0%, transparent 40%);
    animation: ambientShift 25s ease-in-out infinite;
  }

  @keyframes ambientShift {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(-2%, 1.5%); }
  }

  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 40px;
    max-width: 600px;
  }

  /* Double-ring monogram */
  .monogram {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 48px;
    opacity: 0;
    animation: fadeIn 1s ease forwards 0.3s;
  }

  .monogram .outer {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1.5px solid var(--blue);
  }

  .monogram .inner {
    position: absolute;
    inset: 5px;
    border-radius: 50%;
    border: 1px solid var(--rose);
  }

  .monogram span {
    font-family: 'Libre Baskerville', serif;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--cream);
    position: relative;
    z-index: 1;
  }

  .wordmark {
    font-family: 'Libre Baskerville', serif;
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 700;
    letter-spacing: clamp(4px, 1vw, 7px);
    text-transform: uppercase;
    color: var(--cream);
    line-height: 1.1;
    opacity: 0;
    animation: fadeIn 1s ease forwards 0.6s;
  }

  .ribbon {
    display: flex;
    justify-content: center;
    margin: 20px auto;
    width: 44px;
    height: 3px;
    overflow: hidden;
    opacity: 0;
    animation: fadeIn 1s ease forwards 0.9s;
  }

  .ribbon .edge { width: 20%; height: 100%; background: var(--pearl); }
  .ribbon .centre { width: 60%; height: 100%; background: var(--rose); }

  .tagline {
    font-family: 'EB Garamond', serif;
    font-size: clamp(12px, 1.4vw, 15px);
    letter-spacing: clamp(3px, 0.5vw, 5px);
    text-transform: uppercase;
    color: var(--blue);
    opacity: 0;
    animation: fadeIn 1s ease forwards 1.2s;
  }

  .description {
    font-family: 'EB Garamond', serif;
    font-size: clamp(16px, 1.6vw, 19px);
    line-height: 1.8;
    color: var(--pearl);
    margin-top: 40px;
    font-style: italic;
    opacity: 0;
    animation: fadeIn 1s ease forwards 1.5s;
  }

  .launch-note {
    font-family: 'EB Garamond', serif;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    margin-top: 48px;
    opacity: 0;
    animation: fadeIn 1s ease forwards 1.8s;
  }

  .contact {
    margin-top: 32px;
    opacity: 0;
    animation: fadeIn 1s ease forwards 2.1s;
  }

  .contact a {
    font-family: 'EB Garamond', serif;
    font-size: 15px;
    color: var(--blue);
    text-decoration: none;
    letter-spacing: 0.5px;
    transition: color 0.3s;
  }

  .contact a:hover { color: var(--gold); }

  /* Footer */
  .footer {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    text-align: center;
    padding: 24px;
    opacity: 0;
    animation: fadeIn 1s ease forwards 2.4s;
  }

  .footer span {
    font-family: 'EB Garamond', serif;
    font-size: 11px;
    color: var(--mid-grey);
    letter-spacing: 1px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .content { padding: 32px 24px; }
    .monogram { width: 64px; height: 64px; margin-bottom: 36px; }
    .monogram span { font-size: 19px; }
  }
</style>
</head>
<body>

<div class="content">
  <div class="monogram">
    <div class="outer"></div>
    <div class="inner"></div>
    <span>CC</span>
  </div>

  <h1 class="wordmark">Crozier Counsel</h1>

  <div class="ribbon">
    <div class="edge"></div>
    <div class="centre"></div>
    <div class="edge"></div>
  </div>

  <p class="tagline">Strategic Advisory</p>

  <p class="description">
    Authoritative counsel at the intersection of technology, innovation policy and economic transformation.
  </p>

  <p class="launch-note">Launching 2026</p>

  <div class="contact">
    <a href="mailto:info@croziercounsel.com">info@croziercounsel.com</a>
  </div>
</div>

<div class="footer">
  <span>&copy; 2026 Crozier Counsel</span>
</div>

</body>
</html>
